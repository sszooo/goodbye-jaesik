<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홈앤 김재식 여기에 잠들다 - 롤링페이퍼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');
        
        body {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            font-family: 'Nanum Pen Script', cursive;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;
            padding: 20px;
        }

        /* 눈 내리는 애니메이션 */
        #snow-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .snowflake {
            position: absolute;
            top: -50px;
            width: 25px; /* 눈 크기 조절 */
            opacity: 0.7;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }

        /* 올리브 모양 메모지 */
        .olive-note {
            background-color: #f3f9d2;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transition: transform 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 2px solid #56ab2f;
            min-height: 180px;
        }
        .olive-note:hover { transform: scale(1.03) rotate(1deg); }

        .z-index-up { position: relative; z-index: 10; }
    </style>
</head>
<body>

    <div id="snow-container"></div>

    <div class="max-w-4xl mx-auto z-index-up">
        <header class="text-center mb-10">
            <img src="tombstone.png" alt="비석" class="w-32 md:w-40 mx-auto mb-4 drop-shadow-md">
            <h1 class="text-5xl text-white drop-shadow-lg mb-2">홈앤 김재식 여기에 잠들다</h1>
            <p class="text-2xl text-green-100">재식 님을 위한 마지막 롤링페이퍼</p>
        </header>

        <div class="bg-white/90 p-6 rounded-3xl shadow-2xl mb-12">
            <div class="flex flex-col gap-4">
                <input id="sender" type="text" placeholder="보내는 사람 성함" class="text-2xl p-3 border-b-2 border-green-300 outline-none focus:border-green-600 bg-transparent">
                <textarea id="content" placeholder="남기실 메시지를 입력해주세요..." class="text-2xl p-3 border-2 border-green-200 rounded-xl h-32 outline-none focus:border-green-500 bg-white/50"></textarea>
                <button onclick="sendMessage()" id="send-btn" class="bg-green-700 text-white text-3xl py-3 rounded-xl hover:bg-green-800 transition-all active:scale-95 shadow-lg">
                    메시지 안치하기
                </button>
            </div>
        </div>

        <div id="messages-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-20">
            <div class="col-span-full text-center text-white text-3xl opacity-50">메시지를 불러오는 중...</div>
        </div>
    </div>

       <script>
        // --- [ Supabase 설정 ] ---
        // TODO: 아래 정보를 본인의 Supabase 프로젝트 정보로 교체하세요.
        const SUPABASE_URL = 'https://zxludvhkfltsaukmajkh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ZYenhII2_JvGlRbJIxiUcQ_6G3mzGuY';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 눈 내리는 효과 (snow.png 파일 필요)
        function createSnow() {
            const container = document.getElementById('snow-container');
            const count = 25;
            for (let i = 0; i < count; i++) {
                const snow = document.createElement('img');
                snow.src = 'snow.png';
                snow.className = 'snowflake';
                snow.style.left = Math.random() * 100 + 'vw';
                snow.style.animationDuration = (Math.random() * 5 + 3) + 's';
                snow.style.animationDelay = Math.random() * 5 + 's';
                snow.onerror = () => snow.style.display = 'none'; // 이미지 없으면 숨김
                container.appendChild(snow);
            }
        }

        // 메시지 불러오기
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('rolling_messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(200);

            if (error) {
                console.error('Error:', error);
            } else {
                renderMessages(data);
            }
        }

        // 화면에 메시지 그리기
        function renderMessages(messages) {
            const grid = document.getElementById('messages-grid');
            if (messages.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-white text-2xl">아직 도착한 메시지가 없습니다. 첫 번째 메시지를 남겨보세요!</div>`;
                return;
            }
            grid.innerHTML = messages.map(msg => `
                <div class="olive-note p-6 flex flex-col justify-center items-center text-center">
                    <p class="text-3xl mb-4 text-green-900 leading-tight">"${msg.content}"</p>
                    <div class="border-t border-green-200 pt-2 w-full">
                        <span class="text-xl font-bold text-green-800">${msg.sender}</span>
                    </div>
                </div>
            `).join('');
        }

        // 메시지 보내기
        async function sendMessage() {
            const senderInput = document.getElementById('sender');
            const contentInput = document.getElementById('content');
            const btn = document.getElementById('send-btn');

            if (!senderInput.value || !contentInput.value) {
                alert('이름과 내용을 모두 입력해주세요!');
                return;
            }

            btn.disabled = true;
            btn.innerText = '안치 중...';

            const { error } = await supabase
                .from('rolling_messages')
                .insert([{ sender: senderInput.value, content: contentInput.value }]);

            if (error) {
                console.error(error);
                alert('메시지 전송에 실패했습니다. (DB 연결 확인 필요)');
            } else {
                senderInput.value = '';
                contentInput.value = '';
                await fetchMessages(); // 즉시 리스트 갱신
            }
            btn.disabled = false;
            btn.innerText = '메시지 안치하기';
        }

        // 시작 시 실행
        window.onload = () => {
            createSnow();
            fetchMessages();
        };
    </script>
</body>
</html>

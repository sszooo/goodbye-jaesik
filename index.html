<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>굿바이 재식! 롤링페이퍼</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');
        body {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            font-family: 'Nanum Pen Script', cursive;
            min-height: 100vh;
            margin: 0; padding: 20px;
        }
        #snow-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .snowflake { position: absolute; top: -50px; width: 20px; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
        .olive-note { background-color: #f3f9d2; border-radius: 40% 40% 40% 40% / 60% 60% 40% 40%; border: 2px solid #56ab2f; }
        .content-box { position: relative; z-index: 10; max-width: 800px; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="snow-container"></div>

    <div class="content-box">
        <div class="text-center mb-10">
            <img src="tombstone.png" alt="비석" class="w-32 mx-auto mb-4">
            <h1 class="text-5xl text-white drop-shadow-lg">홈앤 김재식 여기에 잠들다</h1>
        </div>

        <div class="bg-white/90 p-6 rounded-3xl shadow-xl mb-10">
            <div class="flex flex-col gap-4">
                <input id="sender" type="text" placeholder="이름" class="text-2xl p-2 border-b-2 border-green-300 outline-none">
                <textarea id="content" placeholder="메시지를 남겨주세요" class="text-2xl p-2 border-2 border-green-100 rounded-xl h-24 outline-none"></textarea>
                <button onclick="sendMessage()" id="send-btn" class="bg-green-700 text-white text-3xl py-2 rounded-xl">메시지 안치하기</button>
            </div>
        </div>

        <div id="messages-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

       <script>
        // --- [ Supabase 설정 ] ---
        // TODO: 아래 정보를 본인의 Supabase 프로젝트 정보로 교체하세요.
        const SUPABASE_URL = 'https://zxludvhkfltsaukmajkh.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ZYenhII2_JvGlRbJIxiUcQ_6G3mzGuY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fetchMessages() {
            const { data, error } = await supabase.from('rolling_messages').select('*').order('created_at', { ascending: false });
            if (!error) {
                const grid = document.getElementById('messages-grid');
                grid.innerHTML = data.map(msg => `
                    <div class="olive-note p-6 text-center">
                        <p class="text-2xl mb-2">"${msg.content}"</p>
                        <p class="text-xl font-bold text-green-800">- ${msg.sender}</p>
                    </div>
                `).join('');
            }
        }

        async function sendMessage() {
            const s = document.getElementById('sender');
            const c = document.getElementById('content');
            if (!s.value || !c.value) return alert('내용을 입력해주세요');
            const { error } = await supabase.from('rolling_messages').insert([{ sender: s.value, content: c.value }]);
            if (!error) { s.value = ''; c.value = ''; fetchMessages(); }
        }

        // 눈 내리는 효과
        for (let i = 0; i < 20; i++) {
            const snow = document.createElement('img');
            snow.src = 'snow.png';
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.getElementById('snow-container').appendChild(snow);
        }

        window.onload = fetchMessages;
    </script>
</body>
</html>
